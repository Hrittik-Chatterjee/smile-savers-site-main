# ═══════════════════════════════════════════════════════════════════════════════
# Smile Savers Dental — CI/CD Pipeline
# ─────────────────────────────────────────────────────────────────────────────
# Triggers:
#   push main   → type-check → build → deploy production → lighthouse audit
#   pull_request → type-check → build → deploy preview → comment URL on PR
#   workflow_dispatch → manual trigger for any branch
# ═══════════════════════════════════════════════════════════════════════════════

name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'production'
        type: choice
        options: [production, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Job: Quality Gate ─────────────────────────────────────────────────────────
jobs:
  quality:
    name: 🔍 Type-check & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Type check
        run: npm run check

      - name: Format check
        run: npx prettier --check "src/**/*.{astro,ts,css}" --log-level warn
        continue-on-error: true   # warn only, don't block

# ── Job: Build ────────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build
        run: npm run build:ci
        env:
          NODE_ENV: production
          TINA_CLIENT_ID: ${{ secrets.TINA_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
          GITHUB_BRANCH: main

      - name: Report bundle sizes
        run: |
          echo "## 📦 Bundle Sizes" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          du -sh dist/_astro/ >> $GITHUB_STEP_SUMMARY
          ls -lh dist/_astro/*.css | awk '{print $5, $9}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist
          retention-days: 7

# ── Job: Deploy Preview (Pull Requests) ──────────────────────────────────────
  deploy-preview:
    name: 🔮 Deploy Preview
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      deployments: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist

      - name: Deploy preview to Cloudflare Pages
        id: cf-deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: smile-savers
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.cf-deploy.outputs.url }}';
            const body = [
              '## 🔮 Preview Deployment',
              '',
              `**URL:** ${url}`,
              '',
              '| Page | Link |',
              '|------|------|',
              `| Home | [Visit](${url}/) |`,
              `| Services | [Visit](${url}/services) |`,
              `| Appointments | [Visit](${url}/appointments) |`,
              `| Contact | [Visit](${url}/contact) |`,
              '',
              '*Preview auto-expires 24h after PR closes.*',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

# ── Job: Deploy Production (main branch) ──────────────────────────────────────
  deploy-production:
    name: 🚀 Deploy Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: read
      deployments: write
    environment:
      name: production
      url: https://smilesavers.dental
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: smile-savers
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Production deployment summary
        run: |
          echo "## 🚀 Production Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://smilesavers.dental" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY

# ── Job: Lighthouse Audit (after production deploy) ───────────────────────────
  lighthouse:
    name: 🏠 Lighthouse Audit
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for Cloudflare propagation
        run: sleep 30

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://smilesavers.dental/
            https://smilesavers.dental/services
            https://smilesavers.dental/appointments
            https://smilesavers.dental/contact
          budgetPath: ./lighthouse-budget.json
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true   # Don't block deploys on lighthouse

      - name: Lighthouse score summary
        run: echo "Lighthouse results uploaded to temporary public storage. Check Actions artifacts."
